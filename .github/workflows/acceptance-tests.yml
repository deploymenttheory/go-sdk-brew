# Runs acceptance tests against the live Homebrew Formulae API every Sunday.
# No credentials required — the API is public and read-only.
name: go | Acceptance Tests

on:
  schedule:
    # 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance-tests:
    name: '🧪 Run Acceptance Tests'
    runs-on: ubuntu-24.04-arm
    env:
      BREW_BASE_URL: 'https://formulae.brew.sh'
      BREW_REQUEST_TIMEOUT: '60s'
      BREW_VERBOSE: 'true'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true
          go-version: stable

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run Acceptance Tests
        run: |
          echo "::group::🧪 Acceptance Tests Setup"
          echo "========================================================================"
          echo "  Running Acceptance Tests against https://formulae.brew.sh"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -count=1 -race -coverprofile=coverage.out -covermode=atomic -timeout=120s ./brew/acceptance/...

          echo ""
          echo "::group::📊 Coverage Summary"
          go tool cover -func=coverage.out | tail -1
          echo "::endgroup::"

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "::group::📈 Detailed Coverage Report"
          go tool cover -func=coverage.out
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          slug: deploymenttheory/go-sdk-brew
          files: ./coverage.out
          flags: acceptancetests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30
